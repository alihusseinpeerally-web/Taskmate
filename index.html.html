const fmtTime = (m) => {
  if (!m && m !== 0) return '—';
  const h = Math.floor(m/60), r = m%60;
  if (h && r) return `${h}h ${r}m`;
  if (h) return `${h}h`;
  return `${r}m`;
};

/* =====================================================================
   UI primitives
   ===================================================================== */

function Btn({ children, variant='primary', size='md', icon, onClick, type='button', disabled, className='' }) {
  const base = 'font-display font-semibold inline-flex items-center justify-center gap-2 transition active:scale-[0.98] disabled:opacity-40 disabled:pointer-events-none';
  const sizes = {
    lg: 'h-12 rounded-xl text-[15px] px-6',
    md: 'h-10 rounded-lg text-[14px] px-4',
    sm: 'h-8 rounded-lg text-[12.5px] px-3',
  };
  const variants = {
    primary: 'bg-coral text-white shadow-[0_8px_18px_-8px_rgba(255,107,53,0.55)] hover:bg-coral-600',
    teal:    'bg-teal-700 text-white shadow-[0_8px_18px_-8px_rgba(10,110,110,0.55)] hover:bg-teal-800',
    dark:    'bg-ink text-white hover:bg-black',
    ghost:   'bg-white text-ink ring-1 ring-black/10 hover:bg-neutral-50',
    outline: 'bg-transparent text-teal-700 ring-1 ring-teal-700/40 hover:bg-teal-50',
    soft:    'bg-teal-50 text-teal-700 hover:bg-teal-100',
  };
  return (
    <button type={type} disabled={disabled} onClick={onClick}
      className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}>
      {icon && <span className="inline-flex w-4 h-4">{icon}</span>}
      {children}
    </button>
  );
}

function Avatar({ name='??', size=40, ring }) {
  const letters = (name||'??').split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
  return (
    <div style={{ width:size, height:size, borderRadius:'50%', background:'#DCEFEC',
      display:'flex',alignItems:'center',justifyContent:'center', fontFamily:'"Plus Jakarta Sans"',
      fontWeight:700, fontSize:size*0.36, color:'#1A1F1F', flexShrink:0,
      boxShadow: ring ? `0 0 0 2.5px ${ring}, 0 0 0 4.5px white` : 'inset 0 0 0 1px rgba(0,0,0,0.04)' }}>
      {letters}
    </div>
  );
}

function CatIcon({ cat, size=44, rounded=12 }) {
  const Glyph = cat.glyph;
  return (
    <div style={{ width:size, height:size, borderRadius:rounded, background:cat.tint, color:cat.ink,
      display:'flex',alignItems:'center',justifyContent:'center', flexShrink:0 }}>
      <div style={{ width:size*0.5, height:size*0.5 }}><Glyph /></div>
    </div>
  );
}

function TierBadge({ tier }) {
  const tones = {
    Bronze:{ bg:'#F2E2D0', ink:'#7A4B1F' },
    Silver:{ bg:'#E5E7EA', ink:'#3F4853' },
    Gold:  { bg:'#FBE8B6', ink:'#7A5A0F' },
  };
  const t = tones[tier] || tones.Silver;
  return (
    <span className="inline-flex items-center gap-1 rounded-full font-display font-bold px-2 py-0.5 text-[10.5px]"
      style={{ background:t.bg, color:t.ink }}>
      <Ico.badge width="10" height="10" sw="2.6" />
      {tier}
    </span>
  );
}

function Rating({ value=5, count, size=12 }) {
  return (
    <div className="inline-flex items-center gap-1">
      <Ico.star width={size} height={size} className="text-[#F5A623]" />
      <span className="font-display font-bold text-[13px] text-ink">{Number(value).toFixed(2)}</span>
      {count != null && <span className="text-[12px] text-neutral-500">({count})</span>}
    </div>
  );
}

function VerifiedChip({ children }) {
  return (
    <span className="inline-flex items-center gap-1 rounded-full bg-teal-50 text-teal-700 px-2 py-0.5 text-[11px] font-display font-semibold">
      <Ico.check width="11" height="11" sw="3" /> {children}
    </span>
  );
}

/* Time-saved chip — surfaced on every booking */
function TimeSavedChip({ minutes }) {
  return (
    <span className="inline-flex items-center gap-1.5 rounded-full bg-coral-50 text-coral-600 px-2.5 py-1 text-[11.5px] font-display font-semibold">
      <Ico.clock width="12" height="12" sw="2.4" />
      ~{fmtTime(minutes)} saved
    </span>
  );
}

/* Toast */
function Toast({ msg, onClose }) {
  useEffect(() => { if (!msg) return; const t=setTimeout(onClose,2400); return ()=>clearTimeout(t); }, [msg]);
  if (!msg) return null;
  return (
    <div className="fixed left-1/2 -translate-x-1/2 bottom-8 z-[80] anim-in"
      style={{ background:'#1A1F1F', color:'#fff', padding:'10px 16px', borderRadius:14,
        fontFamily:'"Plus Jakarta Sans"', fontWeight:600, fontSize:13,
        boxShadow:'0 20px 40px -15px rgba(0,0,0,0.5)' }}>
      {msg}
    </div>
  );
}

/* =====================================================================
   POST A TASK (multi-step)
   ===================================================================== */
function ScreenPostTask({ onClose, onSubmit }) {
  const [step, setStep] = useState(1);
  const [catId, setCatId] = useState(null);
  const [title, setTitle] = useState('');
  const [details, setDetails] = useState('');
  const [area, setArea] = useState('Curepipe');
  const [tierId, setTierId] = useState('std');
  const [budget, setBudget] = useState(800);

  const baseEta = useMemo(() => {
    if (!catId) return 90;
    const m = { cleaning:165, errands:90, grocery:75, laundry:60, docdrop:95, tech:55, handyman:120, moving:180 };
    return m[catId] || 90;
  }, [catId]);

  const tier = TIERS.find(t => t.id === tierId);
  const adjFee = Math.round(budget * tier.mult);
  const platformFee = Math.round(adjFee * 0.18);   // 18% platform fee
  const taskerPayout = adjFee - platformFee;

  const cat = catId ? catById(catId) : null;

  const next = () => setStep(s => Math.min(4, s+1));
  const prev = () => setStep(s => Math.max(1, s-1));

  return (
    <div className="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-stretch md:items-center justify-center p-0 md:p-6 anim-fade" onClick={onClose}>
      <div className="bg-cream w-full md:max-w-2xl md:rounded-3xl overflow-hidden flex flex-col max-h-screen md:max-h-[88vh]"
        onClick={e => e.stopPropagation()}>
        {/* header */}
        <div className="flex items-center justify-between px-5 py-4 bg-white border-b border-black/5">
          <div className="flex items-center gap-2">
            <button onClick={step>1?prev:onClose} className="w-9 h-9 rounded-lg ring-1 ring-black/5 hover:bg-cream flex items-center justify-center">
              <Ico.back width="16" height="16"/>
            </button>
            <div>
              <div className="font-display font-bold text-[16px] text-ink">Post a task</div>
              <div className="text-[11px] font-mono text-neutral-500">Step {step} of 4 · ~60 seconds</div>
            </div>
          </div>
          <button onClick={onClose} className="w-9 h-9 rounded-lg ring-1 ring-black/5 hover:bg-cream flex items-center justify-center"><Ico.x width="16" height="16"/></button>
        </div>

        {/* progress */}
        <div className="h-1 bg-cream">
          <div className="h-full bg-coral transition-all" style={{ width:`${(step/4)*100}%` }}/>
        </div>

        {/* body */}
        <div className="flex-1 overflow-auto p-5 md:p-6">
          {step === 1 && (
            <div className="anim-in">
              <h3 className="font-display font-bold text-[18px] text-ink">What kind of task?</h3>
              <p className="text-[13px] text-neutral-600 mt-1">We'll surface the right specialists for you.</p>
              <div className="mt-4 grid grid-cols-2 sm:grid-cols-3 gap-2.5">
                {CATS.map(c => (
                  <button key={c.id} onClick={()=>{ setCatId(c.id); next(); }}
                    className={`p-3 rounded-xl ring-1 text-left transition
                      ${catId===c.id?'bg-white ring-teal-700/40 shadow-sm':'bg-white ring-black/5 hover:ring-teal-700/20'}`}>
                    <CatIcon cat={c} size={36} rounded={10}/>
                    <div className="mt-2 font-display font-semibold text-[12.5px] text-ink leading-tight">{c.label}</div>
                  </button>
                ))}
              </div>
            </div>
          )}

          {step === 2 && (
            <div className="anim-in space-y-4">
              <div>
                <h3 className="font-display font-bold text-[18px] text-ink">Tell us a bit more</h3>
                <p className="text-[13px] text-neutral-600 mt-1">Short, specific descriptions get faster, better matches.</p>
              </div>
              {cat && (
                <div className="flex items-center gap-3 p-3 bg-white rounded-xl ring-1 ring-black/5">
                  <CatIcon cat={cat} size={40} rounded={10}/>
                  <div>
                    <div className="font-display font-semibold text-[13.5px] text-ink">{cat.label}</div>
                    <button className="text-[11.5px] text-teal-700 font-display font-semibold" onClick={()=>setStep(1)}>Change</button>
                  </div>
                </div>
              )}
              <label className="block">
                <span className="text-[12px] font-display font-semibold text-neutral-700">Title</span>
                <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Deep clean of 2-bed apartment"
                  className="mt-1.5 w-full bg-white rounded-xl ring-1 ring-black/10 px-4 py-3 font-body text-[14px] focus:ring-teal-700/40 focus:outline-none"/>
              </label>
              <label className="block">
                <span className="text-[12px] font-display font-semibold text-neutral-700">Details (optional)</span>
                <textarea value={details} onChange={e=>setDetails(e.target.value)} rows={4}
                  placeholder="Anything the tasker should know — access, supplies, timing constraints…"
                  className="mt-1.5 w-full bg-white rounded-xl ring-1 ring-black/10 px-4 py-3 font-body text-[14px] focus:ring-teal-700/40 focus:outline-none"/>
              </label>
              <label className="block">
                <span className="text-[12px] font-display font-semibold text-neutral-700">Where in Mauritius?</span>
                <select value={area} onChange={e=>setArea(e.target.value)}
                  className="mt-1.5 w-full bg-white rounded-xl ring-1 ring-black/10 px-4 py-3 font-body text-[14px] focus:ring-teal-700/40 focus:outline-none">
                  {['Curepipe','Port Louis','Quatre Bornes','Ebene','Rose Hill','Grand Baie','Beau Bassin','Vacoas','Flacq','Mahebourg'].map(a => <option key={a}>{a}</option>)}
                </select>
              </label>
              <div className="pt-2"><Btn variant="primary" size="lg" onClick={next} disabled={!title.trim()}>Continue</Btn></div>
            </div>
          )}

          {step === 3 && (
            <div className="anim-in space-y-5">
              <div>
                <h3 className="font-display font-bold text-[18px] text-ink">When do you need it?</h3>
                <p className="text-[13px] text-neutral-600 mt-1">Faster service costs more, but takes work off your plate today.</p>
              </div>

              {/* Service tier */}
              <div className="space-y-2">
                <div className="flex items-center gap-2">
                  <span className="text-[12px] font-display font-semibold text-neutral-700">Service tier</span>

                </div>
                <div className="grid grid-cols-3 gap-2">
                  {TIERS.map(t => {
                    const sel = tierId === t.id;
                    return (
                      <button key={t.id} onClick={()=>setTierId(t.id)}
                        className={`p-3 rounded-xl ring-1 text-left transition
                          ${sel ? 'bg-white shadow-sm' : 'bg-white ring-black/5 hover:ring-teal-700/20'}`}
                        style={ sel ? { boxShadow:`0 0 0 2px ${t.ring}` } : {}}>
                        <div className="font-display font-bold text-[13px] text-ink">{t.label}</div>
                        <div className="text-[11px] text-neutral-500 mt-0.5">{t.sub}</div>
                        <div className="font-mono text-[11px] mt-1.5 text-neutral-600">×{t.mult.toFixed(2)}</div>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Budget */}
              <div className="space-y-2">
                <span className="text-[12px] font-display font-semibold text-neutral-700">Your budget</span>
                <input type="range" min={300} max={3000} step={50} value={budget} onChange={e=>setBudget(+e.target.value)} className="w-full accent-coral"/>
                <div className="flex items-center justify-between font-mono text-[12px] text-neutral-500">
                  <span>{fmtRs(300)}</span>
                  <span className="font-display font-bold text-[18px] text-ink">{fmtRs(budget)}</span>
                  <span>{fmtRs(3000)}</span>
                </div>
              </div>

              {/* Time-saved estimate */}
              <div className="rounded-2xl p-4" style={{ background:'linear-gradient(100deg, #FFF1EC, #FFE6D6)' }}>
                <div className="flex items-center gap-2 mb-1">
                  <Ico.clock width="14" height="14" className="text-coral-600"/>
                  <span className="font-display font-bold text-[12.5px] text-coral-600">You save approximately</span>

                </div>
                <div className="font-display font-extrabold text-[28px] text-ink leading-none">{fmtTime(baseEta)}</div>
                <div className="text-[11.5px] text-neutral-600 mt-1.5">Time you'd otherwise spend on this — based on tasker median completion for {cat?cat.label.toLowerCase():'this category'}.</div>
              </div>

              {/* Fee breakdown */}
              <div className="rounded-2xl bg-white ring-1 ring-black/5 p-4">
                <div className="flex items-center justify-between mb-2">
                  <span className="font-display font-bold text-[13px] text-ink">Fee breakdown</span>

                </div>
                <div className="text-[13px] divide-y divide-black/5">
                  <Row k="Job amount"           v={fmtRs(budget)}/>
                  <Row k={`Service tier × ${tier.mult.toFixed(2)}`} v={fmtRs(adjFee - budget)} muted={tier.mult===1}/>
                  <Row k="Platform fee (18%)"   v={`− ${fmtRs(platformFee)}`} muted/>
                  <Row k="Tasker payout"        v={fmtRs(taskerPayout)} muted/>
                  <div className="flex items-center justify-between pt-2.5 mt-1">
                    <span className="font-display font-bold text-[14px] text-ink">You pay</span>
                    <span className="font-display font-extrabold text-[18px] text-coral-600">{fmtRs(adjFee)}</span>
                  </div>
                </div>
                <div className="mt-3 text-[11px] text-neutral-500 leading-snug">
                  Held in escrow until you confirm the task is complete. No surprise charges.
                </div>
              </div>

              <Btn variant="primary" size="lg" onClick={next}>Review & post</Btn>
            </div>
          )}

          {step === 4 && (
            <div className="anim-in space-y-4">
              <h3 className="font-display font-bold text-[18px] text-ink">Almost done — review</h3>
              {cat && (
                <div className="bg-white rounded-2xl ring-1 ring-black/5 p-4 space-y-3">
                  <div className="flex items-center gap-3">
                    <CatIcon cat={cat} size={44} rounded={12}/>
                    <div className="min-w-0">
                      <div className="font-display font-bold text-[14px] text-ink truncate">{title || cat.label}</div>
                      <div className="text-[12px] text-neutral-500">{area} · {tier.label} · saves ~{fmtTime(baseEta)}</div>
                    </div>
                  </div>
                  <div className="flex items-center justify-between text-[13px] pt-2 border-t border-black/5">
                    <span className="font-display font-semibold text-neutral-700">Total</span>
                    <span className="font-display font-extrabold text-[18px] text-coral-600">{fmtRs(adjFee)}</span>
                  </div>

              {/* Trust reassurance before submit */}

                  <Ico.shield width="14" height="14" className="text-teal-700"/>

            <div className="font-display font-bold text-[16px] text-ink">Reliability tiers</div>

        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
          {tierMap.map(t => (

      {/* Verification */}
      <section className="bg-white rounded-3xl ring-1 ring-black/5 p-5 md:p-6">

          <div className="w-10 h-10 rounded-xl bg-teal-50 text-teal-700 flex items-center justify-center"><Ico.shield width="18" height="18"/></div>
          <div>
            <div className="font-display font-bold text-[16px] text-ink">What we ask for during onboarding</div>
            <div className="text-[12px] text-neutral-500">A 6-step verification before your first job</div>
          </div>
        </div>

        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
          {[
            'Government-issued NIC',
            'Police clearance certificate (issued within 12 months)',
            'Address verification (utility bill or lease)',
            'Phone &amp; email confirmation (2-factor)',
            '3 professional or character references',
            'Optional: liability insurance proof (qualifies you for Gold tier)',
          ].map((k,i)=>(
            <div key={i} className="flex items-start gap-2.5 p-3 rounded-xl bg-cream ring-1 ring-black/5">
              <span className="mt-0.5 w-6 h-6 rounded-full bg-teal-700 text-white flex items-center justify-center font-display font-bold text-[11px] flex-shrink-0">{i+1}</span>
              <span className="font-display font-semibold text-[12.5px] text-ink leading-snug" dangerouslySetInnerHTML={{__html: k}}/>
            </div>
          ))}
        </div>
      </section>

      {/* Regulation & worker rights */}
      <section className="bg-white rounded-3xl ring-1 ring-black/5 p-5 md:p-6">
        <div className="flex items-center gap-3 mb-3">
          <div className="w-10 h-10 rounded-xl bg-teal-50 text-teal-700 flex items-center justify-center"><Ico.globe width="18" height="18"/></div>
          <div>
            <div className="font-display font-bold text-[16px] text-ink">Your rights as a tasker</div>
            <div className="text-[12px] text-neutral-500">Mauritian law &amp; TaskMate’s commitments</div>
          </div>
        </div>

        <div className="space-y-3">
          {[
            { k:'Fair pay floor',      d:'Every job posted on TaskMate clears the Workers’ Rights Act 2019 minimum hourly rate after our service fee.' },
            { k:'Insurance cover',     d:'Public liability cover up to Rs 250,000 per booking is included on Gold-tier jobs at no cost to you.' },
            { k:'No retaliation rule', d:'You can decline a job, raise a dispute, or leave a low rating without affecting your account standing.' },
            { k:'Right to disconnect', d:'You decide when to be available. We never penalise you for going offline outside your declared hours.' },
            { k:'Data &amp; privacy',  d:'Your ID documents are encrypted at rest. We never share your personal data with customers beyond first name and approximate area.' },
            { k:'Independent contractor', d:'You work for yourself, set your own prices within tier ranges, and are responsible for your own tax filings (we issue an annual statement).' },
          ].map((r,i)=>(
            <div key={i} className="flex items-start gap-3 py-2.5 border-t border-black/5 first:border-0 first:pt-0">
              <span className="mt-1 w-5 h-5 rounded-full bg-teal-50 text-teal-700 flex items-center justify-center flex-shrink-0"><Ico.check width="11" height="11" sw="3"/></span>
              <div>
                <div className="font-display font-bold text-[13px] text-ink" dangerouslySetInnerHTML={{__html: r.k}}/>

          ))}

      {/* CTA */}
      <section className="rounded-3xl p-6 md:p-8 text-center" style={{ background:'linear-gradient(100deg, #083E3E, #0A6E6E)' }}>
        <h3 className="font-display font-extrabold text-[22px] text-white">Ready to start earning?</h3>
        <p className="mt-1.5 text-[13px] text-white/85 max-w-md mx-auto leading-snug">
          Onboarding takes about 20 minutes. We’ll review your application within 3 working days.
        </p>
        <div className="mt-4 flex justify-center">
          <Btn variant="primary" size="lg" icon={<Ico.plus width="14" height="14"/>}>Apply now</Btn>
        </div>
      </section>
    </div>
  );
}

/* =====================================================================
   PROFILE — user account, preferences, account-level stats
   ===================================================================== */

  const [income, setIncome] = useState('60,001–100,000');
  const [age, setAge] = useState('31–40');

  return (

      <h1 className="font-display font-extrabold text-[22px] text-ink">Profile</h1>

      <div className="bg-white rounded-3xl ring-1 ring-black/5 p-5 md:p-6">
        <div className="flex items-center gap-4">
          <Avatar name={name} size={64} ring="#0A6E6E"/>
          <div>
            <div className="font-display font-bold text-[16px] text-ink">{name}</div>
            <div className="text-[12px] text-neutral-500">{email}</div>
          </div>
        </div>

        <div className="mt-5 grid grid-cols-1 sm:grid-cols-2 gap-4">
          <Field label="Full name" v={name} onChange={setName}/>
          <Field label="Email"     v={email} onChange={setEmail}/>

          <Select label="Age band" v={age} onChange={setAge} opts={['18–30','31–40','41–50','51–65']}/>
          <Select label="Monthly income (MUR)" v={income} onChange={setIncome}
            opts={['Below 30,000','30,001–60,000','60,001–100,000','100,001–150,000','Above 150,000']}/>

          {/* Industry */}
          <div className="sm:col-span-2">
            <div className="flex items-center gap-2 mb-1">
              <span className="text-[12px] font-display font-semibold text-neutral-700">Your industry</span>

            </div>
            <select value={subsector} onChange={e=>setSubsector(e.target.value)}
              className="w-full bg-cream rounded-xl ring-1 ring-black/10 px-4 py-3 font-body text-[14px] focus:ring-teal-700/40 focus:outline-none">
              {SUBSECTORS.map(s => <option key={s}>{s}</option>)}
            </select>
            <p className="mt-1.5 text-[11px] text-neutral-500 leading-snug">
              Used to surface relevant categories first (e.g. document drop-offs for legal &amp; accounting) and to tailor your time-saved estimates.
            </p>

      {/* Personal stats — your impact this month */}
      <div className="bg-white rounded-3xl ring-1 ring-black/5 p-5 md:p-6">
        <div className="flex items-center gap-2 mb-3">
          <h3 className="font-display font-bold text-[15px] text-ink">Your impact this month</h3>

        <div className="grid grid-cols-3 gap-3">
          <Stat k="Tasks completed" v="6"/>

}

function Field({ label, v, onChange }) {
  return (
    <label className="block">
      <span className="text-[12px] font-display font-semibold text-neutral-700">{label}</span>
      <input value={v} onChange={e=>onChange(e.target.value)}
        className="mt-1 w-full bg-cream rounded-xl ring-1 ring-black/10 px-4 py-3 font-body text-[14px] focus:ring-teal-700/40 focus:outline-none"/>
    </label>
  );
}
function Select({ label, v, onChange, opts }) {
  return (
    <label className="block">
      <span className="text-[12px] font-display font-semibold text-neutral-700">{label}</span>
      <select value={v} onChange={e=>onChange(e.target.value)}
        className="mt-1 w-full bg-cream rounded-xl ring-1 ring-black/10 px-4 py-3 font-body text-[14px] focus:ring-teal-700/40 focus:outline-none">
        {opts.map(o => <option key={o}>{o}</option>)}
      </select>
    </label>
  );
}
function Stat({ k, v }) {
  return (
    <div className="rounded-xl bg-cream ring-1 ring-black/5 px-3 py-2.5">
      <div className="font-display font-extrabold text-[18px] text-ink">{v}</div>
      <div className="text-[11px] text-neutral-600 leading-tight">{k}</div>
    </div>
  );
}

/* =====================================================================
   APP root — routing & state
   ===================================================================== */
function App() {
  const [route, setRoute] = useState({ name:'home' });   // {name, taskerId?, bookingId?}
  const [showPost, setShowPost] = useState(false);
  const [bookings, setBookings] = useState(seedBookings());
  const [toast, setToast] = useState('');
  const [lang, setLang] = useState('EN');

  // Scroll to top whenever the user navigates to a different screen.
  useEffect(() => { window.scrollTo({ top: 0, behavior: 'instant' }); }, [route.name, route.taskerId, route.bookingId]);

  const nav = (name, extra={}) => setRoute({ name, ...extra });

  const handleSubmitTask = (form) => {
    const id = 'b'+(bookings.length+1);
    const cat = catById(form.catId);
    const newB = {
      id, cat: form.catId,
      title: form.title || cat.label,
      tasker: TASKERS[Math.floor(Math.random()*TASKERS.length)].name,
      tierId: form.tierId,
      status: 'Awaiting tasker',
      fee: form.fee,
      timeSavedMin: form.timeSavedMin,
      when: 'Today, soon',
      area: form.area,
    };
    setBookings([newB, ...bookings]);
    setShowPost(false);
    setToast('Task posted — taskers nearby being notified.');
    nav('tasks');
  };

  let body = null;
  switch (route.name) {
    case 'home':
      body = <ScreenHome onPost={()=>setShowPost(true)}
                onPickCat={()=>setShowPost(true)}
                onOpenSafety={()=>nav('safety')}
                onOpenTasker={(id)=>nav('tasker',{ taskerId:id })}
                lang={lang}/>;
      break;
    case 'tasker':
      body = <ScreenTaskerProfile taskerId={route.taskerId}
                onClose={()=>nav('home')}
                onMessage={()=>nav('messages')}
                onBook={()=>{ setShowPost(true); }}/>;
      break;
    case 'tasks':
      body = <ScreenMyTasks bookings={bookings} onOpenBooking={(id)=>nav('booking',{ bookingId:id })}/>;
      break;
    case 'booking':
      body = <ScreenBookingDetail bookingId={route.bookingId} bookings={bookings} onClose={()=>nav('tasks')}/>;
      break;
    case 'messages':
      body = <ScreenMessages/>;
      break;
    case 'profile':
      body = <ScreenProfile/>;
      break;
    case 'safety':
      body = <ScreenSafety onClose={()=>nav('home')}/>;
      break;
    case 'taskers':
      body = <ScreenForTaskers onClose={()=>nav('home')}/>;
      break;
    default:
      body = <ScreenHome onPost={()=>setShowPost(true)} onPickCat={()=>setShowPost(true)} onOpenSafety={()=>nav('safety')} onOpenTasker={(id)=>nav('tasker',{ taskerId:id })} lang={lang}/>;
  }

  return (
    <>
      <AppShell active={route.name} onNav={(n)=>nav(n)} onPost={()=>setShowPost(true)}
        lang={lang} setLang={setLang}>
        {body}
      </AppShell>

      {showPost && <ScreenPostTask onClose={()=>setShowPost(false)} onSubmit={handleSubmitTask}/>}
      <Toast msg={toast} onClose={()=>setToast('')}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
